apiVersion: v2
name: gegm-upscaler
description: |
  Déploiement Kubernetes de l'outil interne GEGM Upscaler (FastAPI + Celery).
  Cible : cluster GEGM avec Envoy Gateway, External Secrets Operator (Vault),
  cert-manager, CNPG (Postgres), KeyDB (Redis), VictoriaMetrics (métriques).

  Aucun service infra n'est embarqué dans ce chart — il consomme les services
  managés fournis par l'infra (CNPG cluster, KeyDB instance, Vault,
  Keycloak, S3 OVH, RunPod Serverless, Sentry self-hosted).

type: application

# Version du chart (semver indépendant) — à bumper à chaque changement de
# templates/values même sans changement de code applicatif.
version: 0.1.0

# Version de l'application déployée — matche les tags du backend Docker
# sur le registry GitLab GEGM. Référencée automatiquement par
# `{{ .Chart.AppVersion }}` dans les templates (valeur par défaut de
# `image.tag`).
appVersion: "0.1.0"

keywords:
  - gegm
  - upscaling
  - super-resolution
  - fastapi
  - celery

maintainers:
  - name: KaRn1zC
    email: karn1zc@gmail.com

home: https://github.com/KaRn1zC/GEGM_Upscaler
sources:
  - https://github.com/KaRn1zC/GEGM_Upscaler
