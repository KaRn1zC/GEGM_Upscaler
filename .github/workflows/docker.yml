name: Docker Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a publier (ex: v0.1.0)"
        required: true
        type: string

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/gegm-upscaler-backend
  # Force les actions JS (checkout, setup-node, cache, upload-artifact)
  # à tourner sur Node.js 24 au lieu de Node.js 20 déprécié. GitHub
  # bascule par défaut le 2026-06-02, retire Node.js 20 le 2026-09-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build + Push multi-arch (GHCR)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write  # pour l'upload du rapport Trivy dans Security tab

    outputs:
      version: ${{ steps.meta.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Build-args pour configurer le frontend Vite au build-time.
          # Les vars sont lues depuis les GitHub Variables du repo —
          # tant que `vars.VITE_AUTH_MODE_PROD` n'est pas defini, le
          # build utilise les defaults du Dockerfile (mode `dev`, pas
          # de redirect OIDC). Une fois les URLs Keycloak obtenues de
          # l'infra, definir ces vars pour que les images taguees
          # `v*.*.*` soient buildees en mode OIDC prod.
          build-args: |
            VITE_AUTH_MODE=${{ vars.VITE_AUTH_MODE_PROD || 'dev' }}
            VITE_API_BASE=${{ vars.VITE_API_BASE_PROD || '' }}
            VITE_OIDC_ISSUER=${{ vars.VITE_OIDC_ISSUER_PROD || '' }}
            VITE_OIDC_CLIENT_ID=${{ vars.VITE_OIDC_CLIENT_ID_PROD || 'gegm-upscaler' }}
            VITE_SENTRY_DSN=${{ secrets.FRONTEND_SENTRY_DSN }}
            VITE_SENTRY_ENVIRONMENT=${{ vars.SENTRY_ENVIRONMENT || 'production' }}
            VITE_APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan de vulnerabilites Trivy sur l'image poussee.
      # Echec du job si des CVE CRITICAL/HIGH sont detectees : on prefere
      # bloquer une release vulnerable plutot que la deployer en prod.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-backend-image

  # ───────────────────────────────────────────────────────────────────────
  # Mirror de l'image GHCR vers le registry GitLab GEGM.
  #
  # Le cluster K8s GEGM pull les images depuis le registry GitLab interne
  # (pas de GHCR public accessible depuis le cluster). Plutot que de
  # rebuild une 2e fois (5-10 min), on copie les manifests et layers depuis
  # GHCR vers GitLab avec `docker buildx imagetools create` (~10s, pas de
  # bandwidth inutile).
  #
  # Ce job ne tourne que si les variables GitHub sont configurees :
  #   - vars.GITLAB_REGISTRY_URL       ex: registry.gitlab.gegm.internal
  #   - vars.GITLAB_REGISTRY_IMAGE     ex: infra/gegm-upscaler/backend
  #   - secrets.GITLAB_REGISTRY_USER   deploy token username
  #   - secrets.GITLAB_REGISTRY_TOKEN  deploy token
  #
  # Tant que ces valeurs ne sont pas renseignees (cf. reponses infra
  # attendues), le job se skip automatiquement sans faire echouer le
  # workflow.
  # ───────────────────────────────────────────────────────────────────────
  mirror-to-gitlab:
    name: Mirror image to GitLab Registry (GEGM)
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: vars.GITLAB_REGISTRY_URL != '' && vars.GITLAB_REGISTRY_IMAGE != ''
    permissions:
      contents: read
      packages: read  # pour pull l'image GHCR

    steps:
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR (source)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GitLab Registry (destination)
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GITLAB_REGISTRY_URL }}
          username: ${{ secrets.GITLAB_REGISTRY_USER }}
          password: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

      - name: Compute source and target refs
        id: refs
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          SOURCE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          TARGET: ${{ vars.GITLAB_REGISTRY_URL }}/${{ vars.GITLAB_REGISTRY_IMAGE }}
        run: |
          # Construction des tags sans injection directe de variables dans
          # le script shell (on passe par env et on les consomme avec "$VAR").
          {
            echo "source=$SOURCE:$VERSION"
            echo "target_version=$TARGET:$VERSION"
            # `{major}.{minor}` — on derive depuis la version sans le patch
            minor=$(echo "$VERSION" | awk -F. '{print $1"."$2}')
            echo "target_minor=$TARGET:$minor"
            echo "target_latest=$TARGET:latest"
          } >> "$GITHUB_OUTPUT"

      # `docker buildx imagetools create` copie tous les manifests (multi-arch)
      # et layers de la source vers la cible en referencant directement les
      # blobs du registry source. Pas de pull/push de bytes, juste des
      # pointeurs. Tres rapide (~10s pour une image de 1 Go).
      - name: Mirror semver tag
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.refs.outputs.target_version }}" \
            "${{ steps.refs.outputs.source }}"

      - name: Mirror major.minor tag
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.refs.outputs.target_minor }}" \
            "${{ steps.refs.outputs.source }}"

      - name: Mirror latest tag
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.refs.outputs.target_latest }}" \
            "${{ steps.refs.outputs.source }}"

      - name: Summary
        run: |
          {
            echo "### ✅ Image miroitee vers GitLab Registry"
            echo ""
            echo "| Tag | Ref |"
            echo "|-----|-----|"
            echo "| semver | \`${{ steps.refs.outputs.target_version }}\` |"
            echo "| major.minor | \`${{ steps.refs.outputs.target_minor }}\` |"
            echo "| latest | \`${{ steps.refs.outputs.target_latest }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────
  # Package + publish du Helm chart comme artifact OCI sur GHCR.
  #
  # Rend le chart installable via :
  #   helm upgrade --install gegm-upscaler \
  #     oci://ghcr.io/karn1zc/charts/gegm-upscaler \
  #     --version <semver> -f values-prod.yaml
  #
  # Sans ce job, l'infra doit cloner le repo Git pour deployer — ici on
  # decouple completement le deploiement du repo source.
  #
  # Chart.yaml garde version=0.1.0 en source, mais le CI reecrit version +
  # appVersion avec le tag pousse → l'artifact publie est toujours aligne
  # avec la release applicative.
  # ───────────────────────────────────────────────────────────────────────
  publish-chart:
    name: Package + push Helm chart (GHCR OCI)
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    env:
      CHART_VERSION: ${{ needs.build-and-push.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.3"

      - name: Rewrite Chart.yaml version/appVersion to match the pushed tag
        run: |
          yq -i '.version = strenv(CHART_VERSION) | .appVersion = strenv(CHART_VERSION)' \
            .helm/Chart.yaml
          cat .helm/Chart.yaml

      - name: Helm dependency build
        run: |
          helm repo add keydb https://vixns.github.io/keydb-helm-chart/
          helm dependency build .helm

      - name: Helm lint
        run: helm lint .helm

      - name: Helm package
        run: helm package .helm -d /tmp/chart-dist

      - name: Login to GHCR (OCI)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          echo "$GHCR_TOKEN" | helm registry login ghcr.io -u "$GHCR_USER" --password-stdin

      - name: Helm push to GHCR OCI
        run: |
          helm push "/tmp/chart-dist/gegm-upscaler-${CHART_VERSION}.tgz" \
            oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Summary
        run: |
          {
            echo "### 📦 Helm chart publie (OCI)"
            echo ""
            echo "Install :"
            echo ""
            echo '```bash'
            echo "helm upgrade --install gegm-upscaler \\"
            echo "  oci://ghcr.io/${{ github.repository_owner }}/charts/gegm-upscaler \\"
            echo "  --version ${CHART_VERSION} \\"
            echo "  -f values-prod.yaml"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
