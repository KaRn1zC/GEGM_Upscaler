name: Helm Lint

# Valide le chart Helm `charts/gegm-upscaler/` sur toute PR et push main
# qui touche les manifests K8s. Bloque le merge si `helm lint`, `helm
# template` ou le check YAML raw echoue.
#
# 3 niveaux de validation :
#   1. `helm lint` : syntaxe + best practices Helm
#   2. `helm template --debug` : resolution complete des templates (prod
#      + staging) — detecte les erreurs de rendu
#   3. Validation YAML : `yq` parse la sortie rendue — detecte les YAML
#      invalides qui passeraient le lint mais ne se deploieraient pas

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/helm-lint.yml"
  pull_request:
    paths:
      - "charts/**"
      - ".github/workflows/helm-lint.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Lint + template chart
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: helm lint
        run: helm lint charts/gegm-upscaler

      - name: helm template (prod values)
        run: |
          helm template gegm-upscaler charts/gegm-upscaler \
            --namespace gegm-upscaler \
            --debug \
            > /tmp/rendered-prod.yaml

      - name: helm template (staging values)
        run: |
          helm template gegm-upscaler charts/gegm-upscaler \
            --namespace gegm-upscaler-staging \
            -f charts/gegm-upscaler/values-staging.yaml \
            --debug \
            > /tmp/rendered-staging.yaml

      - name: Check rendered YAML is valid
        run: |
          python3 -c "
          import sys, yaml
          for path in ('/tmp/rendered-prod.yaml', '/tmp/rendered-staging.yaml'):
              with open(path) as f:
                  docs = list(yaml.safe_load_all(f))
              print(f'{path}: {len(docs)} documents YAML valides')
          "

      - name: Summary
        run: |
          {
            echo "### Chart Helm valide"
            echo ""
            echo "| Config | Ressources K8s rendues |"
            echo "|--------|------------------------|"
            prod_count=$(grep -c "^kind:" /tmp/rendered-prod.yaml || true)
            staging_count=$(grep -c "^kind:" /tmp/rendered-staging.yaml || true)
            echo "| prod | $prod_count |"
            echo "| staging | $staging_count |"
          } >> "$GITHUB_STEP_SUMMARY"
