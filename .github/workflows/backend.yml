name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.6"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check backend/

      - name: Ruff format check
        run: uv run ruff format --check backend/

      - name: Run tests (non-DB)
        run: |
          uv run pytest \
            backend/tests/test_storage.py \
            backend/tests/test_sse.py \
            backend/tests/test_gpu_runpod.py \
            backend/tests/test_router_gpu.py \
            backend/tests/test_upscaling.py \
            backend/tests/test_pipeline.py \
            backend/tests/test_download.py \
            backend/tests/test_new_backends.py \
            --cov=backend/app \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 7
