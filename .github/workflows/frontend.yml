name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "!frontend/src-tauri/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "!frontend/src-tauri/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  # Force les actions JS (checkout, setup-node, cache, upload-artifact)
  # à tourner sur Node.js 24 au lieu de Node.js 20 déprécié. GitHub
  # bascule par défaut le 2026-06-02, retire Node.js 20 le 2026-09-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-test-build:
    name: Type-check + Lint + Tests + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Vitest (unit tests)
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 7

      - name: Vite production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
