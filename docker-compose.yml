# Stack applicative pour le développement et le déploiement local.
# Usage : docker compose up -d
#
# Pour ajouter le monitoring (Loki, Prometheus, Grafana, Flower) :
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# En production, surcharger via un docker-compose.prod.yml qui utilise
# `image: ghcr.io/karn1zc/gegm-upscaler-backend:${RELEASE_TAG}` (pas de build:)
# et augmente les limites mémoire/CPU selon les specs du serveur.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: upscaler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-upscaler}
      POSTGRES_DB: upscaler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upscaler"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: gegm-upscaler-backend:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+asyncpg://upscaler:${POSTGRES_PASSWORD:-upscaler}@postgres:5432/upscaler
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /data
      AUTH_BACKEND: static_token
      DEV_AUTH_TOKEN: ${DEV_AUTH_TOKEN:-dev-secret-token-change-me}
      UPSCALE_MODEL: ${UPSCALE_MODEL:-drct-l}
      COREML_MODEL_DIR: /models
      RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
      RUNPOD_ENDPOINT_ID: ${RUNPOD_ENDPOINT_ID:-}
      S3_OUTPUT_ENDPOINT_URL: ${S3_OUTPUT_ENDPOINT_URL:-}
      S3_OUTPUT_BUCKET: ${S3_OUTPUT_BUCKET:-}
      S3_OUTPUT_ACCESS_KEY: ${S3_OUTPUT_ACCESS_KEY:-}
      S3_OUTPUT_SECRET_KEY: ${S3_OUTPUT_SECRET_KEY:-}
      S3_OUTPUT_REGION: ${S3_OUTPUT_REGION:-auto}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - storage-data:/data
      - models:/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: gegm-upscaler-backend:latest
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+asyncpg://upscaler:${POSTGRES_PASSWORD:-upscaler}@postgres:5432/upscaler
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /data
      AUTH_BACKEND: static_token
      DEV_AUTH_TOKEN: ${DEV_AUTH_TOKEN:-dev-secret-token-change-me}
      UPSCALE_MODEL: ${UPSCALE_MODEL:-drct-l}
      COREML_MODEL_DIR: /models
      RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
      RUNPOD_ENDPOINT_ID: ${RUNPOD_ENDPOINT_ID:-}
      S3_OUTPUT_ENDPOINT_URL: ${S3_OUTPUT_ENDPOINT_URL:-}
      S3_OUTPUT_BUCKET: ${S3_OUTPUT_BUCKET:-}
      S3_OUTPUT_ACCESS_KEY: ${S3_OUTPUT_ACCESS_KEY:-}
      S3_OUTPUT_SECRET_KEY: ${S3_OUTPUT_SECRET_KEY:-}
      S3_OUTPUT_REGION: ${S3_OUTPUT_REGION:-auto}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - storage-data:/data
      - models:/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    command: celery -A app.main.celery_app worker --loglevel=info --concurrency=2

volumes:
  pgdata:
  redisdata:
  storage-data:
  models:
