<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    GEGM Upscaler — favicon (Pixel Ascend simplifié 32×32)
    ===========================================================
    Version réduite du logo principal, optimisée pour le rendu favicon
    onglet navigateur. Pas de glow ni gradient (illisibles à 16×16),
    juste l'escalier de 4 carrés en aplat avec contraste maximal.
  -->
  <rect width="32" height="32" fill="#000000"/>

  <!-- Marche 1 — bleu profond (bas-gauche) -->
  <rect x="6" y="20" width="6" height="6" rx="0.8" fill="#1436DE" opacity="0.85"/>

  <!-- Marche 2 — bleu électrique -->
  <rect x="12" y="14" width="6" height="6" rx="0.8" fill="#1436DE"/>

  <!-- Marche 3 — bleu clair -->
  <rect x="18" y="8" width="6" height="6" rx="0.8" fill="#4F6FFF"/>

  <!-- Marche 4 — blanc (sommet) -->
  <rect x="24" y="2" width="6" height="6" rx="0.8" fill="#FFFFFF"/>
</svg>
