# .gitlab-ci.yml — CI GEGM Upscaler
#
# Pipeline GitLab, équivalent des anciens workflows GitHub Actions.
#   - stage lint-test : backend (ruff/mypy/pytest), frontend (tsc/eslint/
#     vitest/build), E2E Playwright, chart Helm.
#   - stage build     : image backend → registry GitLab (sur tag prod ou v*.*.*).
#   - stage deploy    : bump du tag image dans le dépôt GitOps `-argocd`
#                       (ArgoCD prend le relais et synchronise). Sur tag prod
#                       ou v*.*.*.
#
# Déclenchement (workflow:rules) : merge requests, branche main, tags (prod,
# v*.*.*), run manuel.

# Règle partagée : pipeline release complet (lint-test + build + deploy).
# Déclenché par : le tag `prod` (legacy), la branche `prod` (ref suivie par
# ArgoCD pour le chart — un push sur cette branche déploie), ou un tag v*.*.*.
.release_tag_rule: &release_tag_rule
  if: '$CI_COMMIT_TAG == "prod" || $CI_COMMIT_BRANCH == "prod" || $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

stages:
  - lint-test
  - build
  - deploy

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    # Branche prod : ref de déploiement suivie par ArgoCD — un push doit
    # lancer le pipeline release (build + scan + bump GitOps).
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "prod"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

default:
  # Un nouveau pipeline annule les jobs encore en cours sur la même ref
  # (équivalent du concurrency cancel-in-progress de GitHub Actions).
  interruptible: true

# ─────────────────────────────── Backend ───────────────────────────────
# ruff + mypy + alembic + pytest, avec Postgres et Redis en services.
# Rappel GitLab : un service est joignable par son ALIAS (postgres / redis),
# pas par localhost — d'où DATABASE_URL / REDIS_URL pointant sur ces hôtes.
backend:
  stage: lint-test
  image: python:3.12-slim
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_USER: upscaler
    POSTGRES_PASSWORD: upscaler
    POSTGRES_DB: upscaler
    DATABASE_URL: "postgresql+asyncpg://upscaler:upscaler@postgres:5432/upscaler"
    REDIS_URL: "redis://redis:6379/0"
    STORAGE_BACKEND: local
    LOCAL_STORAGE_PATH: /tmp/gegm-upscaler-ci
    AUTH_BACKEND: static_token
    DEV_AUTH_TOKEN: test-token
    UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .uv-cache
  rules:
    - <<: *release_tag_rule
    - changes:
        - backend/**/*
        - pyproject.toml
        - uv.lock
        - .gitlab-ci.yml
  before_script:
    - pip install --no-cache-dir uv==0.11.6
  script:
    - uv sync --frozen
    - uv run ruff check backend/
    - uv run ruff format --check backend/
    - uv run mypy backend/app/
    # Filet de sécurité : attendre que Postgres accepte les connexions
    # (les étapes lint ci-dessus laissent déjà le service démarrer).
    - |
      until python -c "import socket; socket.create_connection(('postgres', 5432), 2)" 2>/dev/null; do
        echo "Attente de Postgres..."; sleep 1
      done
    - uv run alembic upgrade head
    - uv run pytest backend/tests/ --cov=backend/app --cov-report=term-missing --cov-report=xml
  coverage: '/(?i)TOTAL.*?(\d+(?:\.\d+)?)%/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 7 days

# ─────────────────────────────── Frontend ──────────────────────────────
# tsc (type-check) + eslint + vitest + build Vite. Cache du cache npm.
frontend:
  stage: lint-test
  image: node:22
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.npm-cache"
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - .npm-cache
  rules:
    - <<: *release_tag_rule
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml
  before_script:
    - cd frontend
    - npm ci
  script:
    - npx tsc --noEmit
    - npm run lint
    - npm run test:coverage
    - npm run build
  artifacts:
    paths:
      - frontend/dist
    expire_in: 7 days

# ──────────────────────────── E2E (Playwright) ─────────────────────────
# Image officielle Playwright (navigateurs préinstallés) alignée sur la
# version du package (@playwright/test 1.59.1). Mocks API via page.route(),
# aucun backend réel requis.
e2e:
  stage: lint-test
  image: mcr.microsoft.com/playwright:v1.59.1-noble
  variables:
    CI: "true"
    npm_config_cache: "$CI_PROJECT_DIR/.npm-cache"
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - .npm-cache
  rules:
    - <<: *release_tag_rule
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml
  before_script:
    - cd frontend
    - npm ci
    - npm run build   # build statique servi ensuite par `vite preview` (cf. playwright.config webServer en CI)
  script:
    - npm run test:e2e
  artifacts:
    when: on_failure
    paths:
      - frontend/playwright-report/
      - frontend/test-results/
    expire_in: 14 days

# ─────────────────────────────────── Helm ──────────────────────────────
# helm dependency build + lint + rendu prod/staging + validation YAML.
helm:
  stage: lint-test
  image:
    name: alpine/helm:3.16.2
    entrypoint: [""]
  # Absorbe les erreurs réseau transitoires des miroirs apk/charts.
  retry: 2
  rules:
    - <<: *release_tag_rule
    - changes:
        - .helm/**/*
        - .gitlab-ci.yml
  script:
    - helm repo add keydb https://vixns.github.io/keydb-helm-chart/
    - helm dependency build .helm
    - helm lint .helm
    - helm template gegm-upscaler .helm --namespace gegm-upscaler --debug > rendered-prod.yaml
    - helm template gegm-upscaler .helm --namespace gegm-upscaler-staging -f .helm/values-staging.yaml --debug > rendered-staging.yaml
    - apk add --no-cache python3 py3-yaml
    - |
      python3 -c "import yaml
      for p in ('rendered-prod.yaml', 'rendered-staging.yaml'):
          print(p + ':', len(list(yaml.safe_load_all(open(p)))), 'documents YAML valides')"

# ════════════════════════ Build image backend ══════════════════════════
# Build + push de l'image backend sur le registry GitLab GEGM, sur tag prod
# ou v*.*.*. Kaniko (pas de mode privilégié requis — compatible runners
# Kubernetes). Auth via les variables built-in CI_REGISTRY*. Les build-args
# VITE_* retombent sur des valeurs par défaut tant que les variables CI
# (cf. tâche #53) ne sont pas définies — l'image reste alors en mode dev.
#
# Prérequis : Container Registry activé sur le projet (Settings → General).
backend-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  rules:
    - <<: *release_tag_rule
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    # Triple tag : SHA court (réf immuable déployée par ArgoCD — garantit un
    # diff GitOps + rollout même quand le tag git `prod` est réutilisé),
    # tag git (lisibilité humaine sur le registry) et latest.
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/backend/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
      --destination "${CI_REGISTRY_IMAGE}:latest"
      --build-arg "VITE_AUTH_MODE=${VITE_AUTH_MODE_PROD:-dev}"
      --build-arg "VITE_API_BASE=${VITE_API_BASE_PROD:-}"
      --build-arg "VITE_OIDC_ISSUER=${VITE_OIDC_ISSUER_PROD:-}"
      --build-arg "VITE_OIDC_CLIENT_ID=${VITE_OIDC_CLIENT_ID_PROD:-gegm-upscaler}"
      --build-arg "VITE_SENTRY_DSN=${FRONTEND_SENTRY_DSN:-}"
      --build-arg "VITE_SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}"
      --build-arg "VITE_APP_VERSION=${CI_COMMIT_TAG}"

# Scan de vulnérabilités Trivy sur l'image poussée — échec si CVE
# CRITICAL/HIGH corrigeable (on préfère bloquer une release vulnérable).
backend-image-scan:
  stage: build
  needs: ["backend-image"]
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  rules:
    - <<: *release_tag_rule
  variables:
    TRIVY_USERNAME: "${CI_REGISTRY_USER}"
    TRIVY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
  script:
    # Scan de la réf SHA — celle que le bump GitOps déploie réellement.
    - trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"

# ═══════════════════════ Bump GitOps (ArgoCD) ══════════════════════════
# Dernier maillon CI → déploiement. Après build + scan OK, met à jour
# `image.repository` + `image.tag` dans le dépôt GitOps `gegm-upscaler-argocd`
# (fichier prod.yaml) : repository = chemin complet de l'image poussée
# (`$CI_REGISTRY_IMAGE`), tag = SHA court du commit (`$CI_COMMIT_SHORT_SHA`,
# réf immuable : nouveau commit = nouveau tag = diff GitOps garanti, même si
# le tag git `prod` est réutilisé). ArgoCD détecte le commit et synchronise
# le cluster (Application multi-sources : chart `.helm/` du repo applicatif
# + prod.yaml). Aucun helm/kubectl ici.
#
# Auth : variable CI `GITLAB_TOKEN` (write_repository sur le dépôt -argocd).
# Prérequis : la variable doit être *masquée* (sinon le token fuite dans les
# logs) et disponible sur les pipelines de tags protégés (`prod`, `v*`).
deploy-bump-tag:
  stage: deploy
  image: alpine:3.20
  # Le job est idempotent (clone frais + commit-ou-rien) : le retry sur
  # erreur transitoire (apk, réseau git) est sans risque.
  retry: 2
  # Ne bumpe que si l'image a été buildée ET le scan Trivy est passé.
  needs: ["backend-image-scan"]
  rules:
    - <<: *release_tag_rule
  # Un déploiement ne doit jamais être annulé en cours de route.
  interruptible: false
  variables:
    ARGOCD_REPO: "gitlab.kangourouge.com/gegm-creative/ai/gegm-upscaler-argocd.git"
  before_script:
    - apk add --no-cache git yq
  script:
    - git clone --depth 1 "https://oauth2:${GITLAB_TOKEN}@${ARGOCD_REPO}" argocd
    - cd argocd
    - NAME="$CI_REGISTRY_IMAGE" TAG="$CI_COMMIT_SHORT_SHA" yq -i '.image.repository = strenv(NAME) | .image.tag = strenv(TAG)' prod.yaml
    - echo "prod.yaml après bump :" && cat prod.yaml
    - git config user.email "ci@gegmgroup.com"
    - git config user.name "GitLab CI — gegm-upscaler"
    - git add prod.yaml
    # Idempotent : re-run du même commit = même SHA, on ne crée pas de commit
    # vide. [skip ci] évite de déclencher un pipeline inutile sur le -argocd.
    - |
      if git diff --cached --quiet; then
        echo "image.tag déjà à ${CI_COMMIT_SHORT_SHA} — rien à committer."
      else
        git commit -m "chore(deploy): prod image → ${CI_COMMIT_SHORT_SHA} (tag git ${CI_COMMIT_TAG}) [skip ci]"
        git push origin HEAD:main
      fi
