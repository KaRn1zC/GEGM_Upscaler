# ============================================================================
# values.yaml — defaults de production
# ============================================================================
#
# Convention : toute valeur non encore fournie par l'infra GEGM est notée
# `<TO_FILL:NOM_EXPLICITE>`. Grep `<TO_FILL:` pour obtenir la liste complète
# des valeurs à renseigner avant déploiement.
#
# Les secrets (credentials, tokens, DSN) ne sont JAMAIS ici — ils viennent
# de Vault via ExternalSecret (cf. bloc `externalSecret` ci-dessous).
# Ce fichier ne contient que :
#   - configuration publique (URLs, noms, feature flags)
#   - références à des objets infra (Gateway, ClusterSecretStore, etc.)
#   - defaults de ressources (replicas, CPU, mémoire, probes)
#
# ============================================================================

global:
  environment: production

# Suffixe d'environnement consommé par templates/database.yaml (CR CNPG
# Database → base/owner `upscaler_<env>`). Sans cette valeur, le CR rend
# un nom DNS invalide (`upscaler-`) et la sync ArgoCD échoue.
env: prod

# ─── Image ──────────────────────────────────────────────────────────────────
image:
  # Registry GitLab GEGM — path exact à récupérer de l'infra
  # Format attendu : registry.<gitlab-gegm-domain>/<group>/<project>/<image>
  repository: "<TO_FILL:GITLAB_REGISTRY_URL>/gegm-upscaler-backend"
  # Vide → utilise `.Chart.AppVersion` (= 0.1.0). Override pour déployer
  # une version spécifique sans bumper le chart.
  tag: ""
  pullPolicy: IfNotPresent

# Secret Docker-registry (type `kubernetes.io/dockerconfigjson`) qui
# contient les credentials GitLab GEGM. Deux options :
#   - créé manuellement par l'infra dans le namespace (plus simple)
#   - synchronisé depuis Vault via un ExternalSecret dédié (plus propre)
imagePullSecrets:
  - name: "<TO_FILL:GITLAB_IMAGE_PULL_SECRET>"

# ─── ServiceAccount ─────────────────────────────────────────────────────────
# Le SA est annoté pour l'auth Vault Kubernetes : un role Vault est créé
# côté infra qui mappe ce SA → policy sur `secret/gegm-upscaler/*`.
serviceAccount:
  create: true
  name: ""  # vide → auto-généré à partir du fullname
  annotations: {}
    # Exemple (à adapter selon la convention GEGM) :
    # vault.hashicorp.com/role: "gegm-upscaler"

# ─── External Secrets Operator ──────────────────────────────────────────────
# Synchronise les secrets Vault en Secret K8s natif consommé via envFrom.
# Les clés attendues côté Vault doivent exister avant déploiement
# (un objet KV unique à `remoteKey`, clés = noms des variables d'env).
externalSecret:
  enabled: true
  # Fréquence de resync Vault → Secret K8s (incident Vault de courte durée
  # n'interrompt pas les pods qui ont déjà les valeurs dans leur env).
  refreshInterval: "1h"
  secretStoreRef:
    name: "<TO_FILL:CLUSTER_SECRET_STORE_NAME>"  # ex: vault-cluster-store
    kind: ClusterSecretStore
  # Chemin unique du secret Vault (relatif au mount du ClusterSecretStore).
  # Toutes les clés vivent dans un seul objet KV ; le nom de chaque clé
  # doit correspondre exactement à la variable d'env consommée par l'app.
  remoteKey: "gegm-creative/prod/upscaler"
  keys:
    # Database (CNPG Postgres)
    - DB_PASSWORD
    # Storage S3 OVH (app — R/W sur inputs + outputs)
    - S3_ACCESS_KEY
    - S3_SECRET_KEY
    # Storage S3 OVH (output bucket — credentials pourraient être identiques
    # ou différents selon le scoping retenu, cf. INFRA_QUESTIONS section 2)
    - S3_OUTPUT_ACCESS_KEY
    - S3_OUTPUT_SECRET_KEY
    # Keycloak OIDC
    - OIDC_CLIENT_SECRET
    # RunPod Serverless
    - RUNPOD_API_KEY
    # Sentry self-hosted
    - SENTRY_DSN

# ─── Config publique (ConfigMap → envFrom) ─────────────────────────────────
config:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  # Origines autorisées pour les appels cross-origin :
  # - le site web servi par FastAPI lui-même (même origine, surtout pour les outils
  #   externes qui pourraient appeler l'API)
  # - `tauri://localhost` (macOS) et `https://tauri.localhost` (Windows/Linux)
  #   pour permettre au .dmg/.msi/.AppImage installé de tirer sur l'API distante
  CORS_ORIGINS: '["https://upscaler.gegmgroup.com","tauri://localhost","https://tauri.localhost"]'

  # Emails autorisés sur /api/admin/* (liste JSON). Vide = aucun admin :
  # tous les endpoints admin répondent 403. À renseigner côté GEGM.
  ADMIN_EMAILS: '[]'

  # Backends (voir backend/app/core/config.py)
  STORAGE_BACKEND: "s3"
  AUTH_BACKEND: "oidc"
  # `env` car les secrets sont déjà injectés comme variables d'env via
  # ExternalSecret — pas besoin de runtime-loading depuis Vault.
  SECRETS_BACKEND: "env"

  # Modèle Core ML local par défaut (legacy — v2 est cloud-only, cette
  # variable n'influence plus le routage RunPod qui se fait par scale
  # dans `backend.app.jobs.service._model_for_scale`).
  UPSCALE_MODEL: "drct-l"

  # Limites d'upload et de jobs GPU (cf. backend/app/core/config.py).
  # MAX_UPLOAD_SIZE_MB doit rester cohérent avec api.resources.limits.memory
  # (le fichier transite en RAM) ; l'Execution Timeout de l'endpoint RunPod
  # doit être ≥ GPU_JOB_TIMEOUT_MAX_S (6 h), sinon RunPod coupe avant nous.
  MAX_UPLOAD_SIZE_MB: "300"
  # 64 MP couvre tous les boîtiers plein format ; borné par le budget temps
  # GPU (120+200xMP s, plafonné par GPU_JOB_TIMEOUT_MAX_S) et la RAM worker.
  MAX_INPUT_MEGAPIXELS: "64"
  # 6 h : laisse finir un upscale lourd (gros DRCT-L ×4) sans coupure. Le
  # gaspillage au repos est borné par l'Idle Timeout (5 min) de l'endpoint.
  GPU_JOB_TIMEOUT_MAX_S: "21600"

  # Storage S3 OVH — input (uploads) et output (résultats)
  S3_BUCKET: "upscaler-gegmgroup-com-inbox"
  S3_ENDPOINT_URL: "https://s3.gra.io.cloud.ovh.net"  # ex: https://s3.gra.io.cloud.ovh.net
  S3_REGION: "gra"              # ex: gra
  S3_OUTPUT_BUCKET: "upscaler-gegmgroup-com-outbox"
  S3_OUTPUT_ENDPOINT_URL: "https://s3.gra.io.cloud.ovh.net"  # identique à S3_ENDPOINT_URL si même provider
  S3_OUTPUT_REGION: "gra"

  # Keycloak OIDC
  OIDC_ISSUER: "https://sso.vixns.net/auth/realms/gegm"      # ex: https://keycloak.gegm.internal/realms/gegm
  OIDC_CLIENT_ID: "upscaler.gegmgroup.com"

  # RunPod Serverless
  RUNPOD_ENDPOINT_ID: "sccttzfucc5ks1"

  # Frontend SPA embarqué dans l'image backend (chemin absolu dans le
  # conteneur). Vide → FastAPI ne sert pas de frontend (utile en dev
  # local où Vite tourne sur son propre port).
  FRONTEND_DIST: "/app/frontend/dist"

  # OpenTelemetry — traces distribuées FastAPI → Celery → RunPod.
  # Vide → OTel désactivé. Cible = l'OTel collector interne (confirmé infra
  # 2026-06-18, sans TLS → INSECURE=true). Service name surchargé côté worker
  # (auto "gegm-upscaler-worker") pour distinguer les deux dans les traces.
  # ⚠ Hôte = nom de service conventionnel d'un OTel Collector ; à confirmer
  # par l'infra (`kubectl -n monitoring get svc | grep -i otel`) — si le nom
  # diffère, c'est cette seule ligne à ajuster.
  OTEL_SERVICE_NAME: "gegm-upscaler-api"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4317"
  OTEL_EXPORTER_OTLP_INSECURE: "true"  # collector intra-cluster, plaintext gRPC
  OTEL_TRACES_SAMPLER_RATIO: "0.1"

# ─── Database (CNPG Postgres) ──────────────────────────────────────────────
# Hypothèse : un cluster CNPG est provisionné dans le même namespace (ou
# un namespace infra avec un endpoint exposé). `DATABASE_URL` est construit
# à partir de ces valeurs + `DB_PASSWORD` (via ExternalSecret).
database:
  # Service CNPG en mode RW — conventionnellement `<cluster>-rw`.
  host: "pgpool.gegm.svc"  # ex: gegm-upscaler-pg-rw
  port: 5432
  name: "upscaler_prod"
  user: "upscaler_prod"

# ─── Redis / KeyDB ──────────────────────────────────────────────────────────
# KeyDB = drop-in Redis. Le client `redis.asyncio` est compatible.
#
# ⚠️ Broker Celery + result backend + pub/sub SSE EXIGENT un primaire unique
# (BRPOP atomique, lecture après écriture, pub/sub intra-nœud). KeyDB tourne
# en active-active 3 nœuds (1 par DC, choix infra) à réplication asynchrone :
# y connecter l'app via le service load-balancé `keydb` répartit producteurs
# et consommateurs sur des nœuds différents → mêmes messages consommés deux
# fois (4 jobs GPU pour un upscale, observé le 2026-06-12), pub/sub SSE muet
# entre nœuds (multi-master-no-forward), et risque de perte de message.
# On épingle donc TOUT le trafic app sur le pod `keydb-0` via le service
# headless (DNS stable du StatefulSet) : sémantique single-primary restaurée,
# les nœuds 1 et 2 restent des réplicas async/standby. La topologie 3 nœuds
# de l'infra est préservée.
redis:
  host: "keydb-0.keydb-headless"  # pod 0 du StatefulSet (DNS headless stable)
  port: 6379
  database: 0

keydb:
  enabled: true
  fullnameOverride: keydb
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  service:
    trafficDistribution:
      enabled: true
    annotations:
      argocd.argoproj.io/sync-wave: "-2"
  imageTag: latest
  persistentVolume:
    enabled: true
  configExtraArgs:
    - client-output-buffer-limit: replica 512mb 0 0
    # Quoté impérativement : `yes` nu est parsé en booléen YAML et rendu
    # `true` dans server.sh — valeur que keydb-server refuse au démarrage.
    - multi-master-no-forward: "yes"
    - maxmemory: 400mb
    # noeviction : KeyDB sert de broker Celery — on refuse les écritures à
    # saturation plutôt que d'évincer silencieusement des tâches en attente.
    - maxmemory-policy: noeviction
    # AOF activé (le subchart le met à `no`) : l'app est épinglée sur
    # keydb-0, qui devient le nœud broker unique. Sans AOF, un reschedule
    # du pod viderait la file Celery ; avec, la file est rejouée depuis le
    # volume persistant (persistentVolume.enabled ci-dessus).
    - appendonly: "yes"
  topologySpreadConstraints:
   - maxSkew: 1
     topologyKey: "topology.kubernetes.io/zone"


# ─── API (FastAPI) ──────────────────────────────────────────────────────────
api:
  replicaCount: 2
  containerPort: 8000
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      # 2 Gi : un upload transite en RAM (MAX_UPLOAD_SIZE_MB = 300 Mo
      # + buffers de validation/PIL) — 1 Gi exposait à l'OOMKill.
      memory: "2Gi"
  probes:
    liveness:
      path: "/api/health"
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    readiness:
      path: "/api/health/ready"
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ─── Worker Celery ──────────────────────────────────────────────────────────
worker:
  replicaCount: 2
  concurrency: 2
  metricsPort: 8001  # expose /metrics Prometheus custom (cf. app.core.metrics)
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      # 3 Gi : le worker télécharge les outputs upscalés (plusieurs
      # centaines de Mo en PNG sur les grandes images) avant de les
      # reverser dans le storage — 2 tâches concurrentes possibles.
      memory: "3Gi"
  # Grace period suffisante pour laisser un upscale RunPod se terminer
  # avant SIGKILL (cold start max ~15 min).
  terminationGracePeriodSeconds: 900
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# ─── Celery Beat (scheduler cleanup + reaper) ──────────────────────────────
# Singleton strict : jamais plus de 1 replica (sinon les tâches planifiées
# s'exécuteraient en double).
beat:
  enabled: true
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# ─── Gateway API (Envoy Gateway) ───────────────────────────────────────────
gateway:
  enabled: true
  # Référence à la Gateway Envoy gérée par l'infra. Cette Gateway doit
  # déjà exister et être configurée pour accepter des HTTPRoute du namespace
  # de l'app (ou bien être cross-namespace-enabled).
  parentRefs:
    - name: "<TO_FILL:ENVOY_GATEWAY_NAME>"
      namespace: "<TO_FILL:ENVOY_GATEWAY_NAMESPACE>"
  # Hostname public de l'app — DNS doit pointer sur le LB de la Gateway.
  hostnames:
    - "upscaler.gegmgroup.com"

# ─── Rate limiting (Envoy Gateway BackendTrafficPolicy) ───────────────────
# Protection simple contre les usages abusifs. `Local` = en mémoire de
# chaque replica Envoy, pas de coordination cross-replica (acceptable
# pour un outil interne ~50 users).
#
# Pour affiner (ex: limite plus stricte sur /api/uploads, ou par user),
# dupliquer cette section avec un `headerMatch` sur le token Bearer.
rateLimit:
  enabled: true
  rules:
    # 200 req/min par IP — suffit pour un usage normal (navigation +
    # polling SSE + quelques uploads). Un user qui dépasse est
    # probablement un bug frontend ou un script.
    - requests: 200
      unit: Minute
      sourceCIDR: "0.0.0.0/0"

# ─── Celery Exporter (danihodovic/celery-exporter) ─────────────────────────
# Expose les métriques Celery (queue length, tasks succeeded/failed/retried,
# duration p50/p95/p99, workers online) à partir du broker Redis/KeyDB.
# Complémentaire du serveur Prometheus custom des workers (port 8001) qui
# ne couvre que les compteurs applicatifs (`upscale_duration_seconds`, etc.).
#
# Image publique, pas de secret nécessaire. Désactivable via `enabled: false`
# si l'infra préfère monter son propre exporter partagé.
celeryExporter:
  enabled: true
  image:
    repository: "danihodovic/celery-exporter"
    tag: "0.10.14"
    pullPolicy: IfNotPresent
  port: 9808
  # Args additionnels passés au binaire — ex: `--log-level=debug`,
  # `--retry-interval=5`. Cf. https://github.com/danihodovic/celery-exporter
  extraArgs: []
  resources:
    requests:
      cpu: "20m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# ─── Monitoring (VictoriaMetrics / Prometheus Operator) ────────────────────
# ServiceMonitor pour l'API + PodMonitor pour les workers Celery (qui
# exposent sur le port 8001 et n'ont pas de Service face utilisateur).
monitoring:
  enabled: true
  interval: "30s"
  scrapeTimeout: "10s"
  # Labels ajoutés aux objets ServiceMonitor/PodMonitor/PrometheusRule —
  # utile si VictoriaMetrics filtre les resources par label.
  additionalLabels: {}

# ─── Alerting (Prometheus Rules) ───────────────────────────────────────────
# 6 règles pré-définies pour détecter : taux d'échec anormal, worker
# bloqué, latence API élevée, pods down (API/worker/beat), crash loop.
# Le routing Slack/email est géré par l'Alertmanager GEGM (aucun
# `AlertmanagerConfig` inclus — c'est la config interne de l'infra).
alerting:
  enabled: true

# ─── Securité pod ───────────────────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ─── NodeSelector / Tolerations / Affinity ─────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}
