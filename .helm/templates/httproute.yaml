{{- if .Values.gateway.enabled -}}
# HTTPRoute attaché à la Gateway Envoy gérée par l'infra GEGM.
# L'API et le frontend sont servis sous le même hostname — le backend
# sert les fichiers statiques Vite (build frontend embarqué dans l'image),
# les routes `/api/*` tapent sur FastAPI.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "gegm-upscaler.fullname" . }}
  labels:
    {{- include "gegm-upscaler.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- range .Values.gateway.parentRefs }}
    - name: {{ .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
    {{- end }}
  hostnames:
    {{- range .Values.gateway.hostnames }}
    - {{ . | quote }}
    {{- end }}
  # Unique backend : FastAPI sert à la fois l'API (/api/*) et le frontend
  # SPA Vite embarqué dans la même image (StaticFiles + fallback index.html
  # pour les deep links React Router — cf. `backend/app/main.py`).
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "gegm-upscaler.fullname" . }}-api
          port: {{ .Values.api.containerPort }}
{{- end }}
