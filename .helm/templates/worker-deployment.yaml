apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gegm-upscaler.fullname" . }}-worker
  labels:
    {{- include "gegm-upscaler.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  # Le worker n'est pas stateless au sens strict : un pod en plein upscale
  # doit finir son job avant de se faire kill (cf. grace period ci-dessous).
  # Rolling update reste OK, mais on limite le surge pour ne pas exploser
  # la facturation RunPod si on redéploie souvent.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "gegm-upscaler.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "gegm-upscaler.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "gegm-upscaler.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "gegm-upscaler.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["celery"]
          args:
            - "-A"
            - "app.main.celery_app"
            - "worker"
            - "--loglevel=info"
            - "--concurrency={{ .Values.worker.concurrency }}"
          ports:
            # Port 8001 : serveur HTTP Prometheus démarré par le hook
            # `worker_process_init` (cf. backend/app/core/celery.py:_start_prometheus_metrics_server).
            - name: metrics
              containerPort: {{ .Values.worker.metricsPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gegm-upscaler.configMapName" . }}
            {{- if .Values.externalSecret.enabled }}
            - secretRef:
                name: {{ include "gegm-upscaler.secretName" . }}
            {{- end }}
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: REDIS_URL
              value: "redis://$(REDIS_HOST):$(REDIS_PORT)/$(REDIS_DB)"
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
