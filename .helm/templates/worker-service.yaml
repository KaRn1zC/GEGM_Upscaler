{{- if .Values.monitoring.enabled -}}
# Service headless pour exposer le port 8001 des pods worker aux scrapers
# (VictoriaMetrics via ServiceMonitor). Headless car pas d'équilibrage
# nécessaire — chaque pod a sa propre instance Prometheus qui lui est propre.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gegm-upscaler.fullname" . }}-worker-metrics
  labels:
    {{- include "gegm-upscaler.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  clusterIP: None  # headless
  ports:
    - port: {{ .Values.worker.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "gegm-upscaler.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: worker
{{- end }}
