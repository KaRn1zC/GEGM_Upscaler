{{- if .Values.externalSecret.enabled -}}
# ExternalSecret qui synchronise les secrets Vault en Secret K8s natif.
# L'External Secrets Operator (CRD `external-secrets.io/v1`) doit être
# installé dans le cluster + un `ClusterSecretStore` pointant vers Vault
# doit exister (côté infra).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "gegm-upscaler.secretName" . }}
  labels:
    {{- include "gegm-upscaler.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    # Le Secret K8s généré a exactement ce nom — référencé par les
    # Deployments via `envFrom.secretRef`.
    name: {{ include "gegm-upscaler.secretName" . }}
    creationPolicy: Owner
    # Reconstruction propre à chaque sync (évite les clés orphelines si
    # on retire une entrée de la liste `keys`).
    deletionPolicy: Retain
  data:
    {{- range .Values.externalSecret.keys }}
    - secretKey: {{ . }}
      remoteRef:
        key: {{ $.Values.externalSecret.remoteKey }}
        property: {{ . }}
    {{- end }}
{{- end }}
